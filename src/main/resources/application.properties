spring.application.name=AcademicScope

# MySQL config (XAMPP default)
spring.datasource.url=jdbc:mysql://localhost:3306/academicscope?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Directorio de subida de archivos (absoluto o relativo)
file.upload-dir=uploads/

# Server
server.port=8080

# Cargar variables del archivo .env
spring.config.import=optional:file:.env

# Tamaño máximo de subida
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

